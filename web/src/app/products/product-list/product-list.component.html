<div class="header">
  <h2>Products</h2>
  <mat-checkbox
    [checked]="showInactive()"
    (change)="toggleShowInactive($event.checked)"
    aria-label="Show inactive products">
    Show inactive
  </mat-checkbox>
  <a mat-raised-button color="primary" routerLink="/products/new">
    <mat-icon>add</mat-icon>
    New Product
  </a>
</div>

@if (loading()) {
  <div class="spinner-container">
    <mat-spinner diameter="48" />
  </div>
} @else {
  <table mat-table [dataSource]="products()" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="sku">
      <th mat-header-cell *matHeaderCellDef>SKU</th>
      <td mat-cell *matCellDef="let p">{{ p.sku }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let p">{{ p.name }}</td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let p">{{ p.category }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let p">{{ p.price }}</td>
    </ng-container>

    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef>Stock</th>
      <td mat-cell *matCellDef="let p">{{ p.stock }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let p">
        <mat-chip [color]="p.active ? 'primary' : 'warn'" highlighted>
          {{ p.active ? 'ACTIVE' : 'INACTIVE' }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button color="primary" (click)="edit(p.id)" aria-label="Edit product">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="delete(p.id)" aria-label="Delete product">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell no-data" [colSpan]="displayedColumns.length">
        {{ showInactive() ? 'No inactive products found.' : 'No active products found.' }}
      </td>
    </tr>
  </table>
}
