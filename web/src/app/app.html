<mat-toolbar color="primary">
  <mat-icon>people</mat-icon>
  <span class="toolbar-title">{{ title }}</span>
  <span class="spacer"></span>
  @if (isAuthenticated()) {
    <span class="username">{{ username() }}</span>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Logout
    </button>
  }
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>
