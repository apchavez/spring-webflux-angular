services:

  kafka:
    image: bitnamilegacy/kafka:3.9
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_CLIENT_USERS: ${KAFKA_USER:-local_kafka_user}
      KAFKA_CLIENT_PASSWORDS: ${KAFKA_PASSWORD:-local_kafka_pass}
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
    volumes:
      - ./docker/kafka-client.properties:/tmp/kafka-client.properties:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /tmp/kafka-client.properties"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-productdb}
      POSTGRES_USER: ${DB_USER:-product_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-product_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-product_user} -d ${DB_NAME:-productdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-productdb}
      DB_USER: ${DB_USER:-product_user}
      DB_PASSWORD: ${DB_PASSWORD:-product_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_USER: ${KAFKA_USER:-local_kafka_user}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-local_kafka_pass}
      # Spring's CorsConfigurationSource is registered for "/**" regardless of whether
      # any origin is configured — with an empty allowlist it rejects (403, no body) any
      # request carrying an Origin header, which every real browser sends on POST even
      # when nginx is proxying same-origin. Without this, the web login form can never
      # reach the API from a browser (curl without an Origin header was misleadingly fine).
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app_network

  web:
    build: ./web
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - app_network
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      - prometheus

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
