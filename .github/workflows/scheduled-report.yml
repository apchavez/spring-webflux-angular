name: Scheduled Product Report
# Weekly product-catalog summary — re-pushed to force GitHub to refresh the cached workflow display name.

on:
  schedule:
    - cron: "0 8 * * 1" # weekly, Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/actuator/health/readiness | grep -q '"status":"UP"'; then
              echo "API is ready."
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "::error::API never became ready"
          docker compose logs api
          exit 1

      - name: Log in as demo admin
        id: login
        run: |
          TOKEN=$(curl -fs -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' | jq -r .token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Login did not return a token"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Seed sample products via CSV import
        env:
          TOKEN: ${{ steps.login.outputs.token }}
        run: |
          cat > /tmp/sample-products.csv <<'EOF'
          sku,name,description,category,price,stock,active
          RPT-001,Teclado mecánico,Teclado mecánico retroiluminado,Periféricos,49.90,120,true
          RPT-002,Mouse inalámbrico,Mouse ergonómico 2.4GHz,Periféricos,19.90,300,true
          RPT-003,Monitor 27",Monitor IPS 27 pulgadas 144Hz,Monitores,289.00,45,true
          RPT-004,Silla ergonómica,Silla de oficina con soporte lumbar,Muebles,159.00,15,true
          RPT-005,Webcam HD,Webcam 1080p con micrófono,Periféricos,34.90,80,true
          RPT-006,Auriculares Bluetooth,Auriculares over-ear con cancelación de ruido,Audio,79.90,60,true
          RPT-007,Hub USB-C,Hub USB-C 7 en 1,Accesorios,29.90,200,false
          EOF

          RESPONSE=$(curl -fs -X POST http://localhost:8080/api/v1/products/import \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@/tmp/sample-products.csv;type=text/csv")
          JOB_ID=$(echo "$RESPONSE" | jq -r .jobExecutionId)
          echo "Import job: $JOB_ID"

          for i in $(seq 1 20); do
            STATUS=$(curl -fs -H "Authorization: Bearer $TOKEN" \
              "http://localhost:8080/api/v1/products/import/$JOB_ID" | jq -r .status)
            echo "Import status: $STATUS ($i/20)"
            if [ "$STATUS" = "COMPLETED" ] || [ "$STATUS" = "FAILED" ]; then
              break
            fi
            sleep 3
          done

      - name: Fetch PDF and Excel reports
        env:
          TOKEN: ${{ steps.login.outputs.token }}
        run: |
          curl -fs -H "Authorization: Bearer $TOKEN" \
            http://localhost:8080/api/v1/products/report/pdf -o products-report.pdf
          curl -fs -H "Authorization: Bearer $TOKEN" \
            http://localhost:8080/api/v1/products/report/excel -o products-report.xlsx
          ls -la products-report.*

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-reports-${{ github.run_id }}
          path: |
            products-report.pdf
            products-report.xlsx
          if-no-files-found: warn
          retention-days: 30

      - name: Email reports (optional)
        if: ${{ vars.REPORT_EMAIL != '' && secrets.SMTP_SERVER != '' }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Reporte semanal de productos — spring-webflux-angular"
          to: ${{ vars.REPORT_EMAIL }}
          from: Product Reports Bot
          body: "Reporte de catálogo generado automáticamente. Ver adjuntos (PDF y Excel)."
          attachments: products-report.pdf,products-report.xlsx

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
