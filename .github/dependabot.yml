version: 2
updates:
  - package-ecosystem: gradle
    directory: "/api"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      angular:
        patterns:
          - "@angular/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/api"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/web"
    schedule:
      interval: weekly
